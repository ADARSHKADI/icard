<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>I Card Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;

    background:
    radial-gradient(circle at top left,#d8e9ff 0%,transparent 30%),
    radial-gradient(circle at bottom right,#cfe3ff 0%,transparent 30%),
    linear-gradient(135deg,#eef5ff,#ffffff);
}

.card{
    background:#475569;
    color:#fff;
    border:none;
    border-radius:16px;
    box-shadow:0 6px 15px rgba(0,0,0,.15);
}

.school-title{

font-size:30px;

font-weight:700;

color:#FFF;

}

.sub-title{

font-size:22px;

font-weight:600;

color:#dbeafe;

}

.form-control,
.form-select{

border-radius:12px;

height:48px;

}

textarea.form-control{

height:100px;

}

.btn-save{

height:50px;

font-size:18px;

font-weight:bold;

border-radius:12px;

}

#loading{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(255,255,255,.8);

display:none;

justify-content:center;

align-items:center;

z-index:9999;

}

</style>

</head>

<body>

<div id="loading">

<div class="spinner-border text-primary"
style="width:4rem;height:4rem"></div>

</div>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card">

<div class="card-body p-4">

<div class="text-center mb-4">

<h2 class="school-title">
પી.એમ.જી. ઠાકર આદર્શ હાઇસ્કૂલ, કડી 
</h2>

<h4 class="sub-title">
I-Card વિગત 2026-27
</h4>

</div>





  <form id="entryForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>ધોરણ</label>

<select class="form-select" id="std">
<option value="">ધોરણ પસંદ કરો </option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>વર્ગ </label>

<select class="form-select" id="class">
<option value="">વર્ગ પસંદ કરો</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>રોલ નંબર (અંગ્રેજી અંકોમાં)</label>

<input type="number"
id="roll"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label> વિદ્યાર્થીનું નામ (અંગ્રેજી કેપિટલ)</label>

<input
type="text"
id="name"
class="form-control"
style="text-transform:uppercase;">

</div>

<div class="col-md-6 mb-3">

<label>GR નંબર ( અંગ્રેજી આંકડા)</label>

<input
type="number"
id="gr"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>જન્મ તારીખ </label>

<input
type="date"
id="dob"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>મોબાઈલ નંબર ( અંગ્રેજી અંકોમાં  , 10 આંકડામાં ) </label>

<input

type="tel"

maxlength="10"

pattern="[0-9]{10}"

id="mobile"

class="form-control">

</div>

<div class="col-12 mb-3">

<label>સરનામું (અંગ્રેજીમાં)</label>

<textarea

id="address"

class="form-control">

</textarea>

</div>

<div class="col-12">

<button
type="submit"
class="btn btn-primary w-100 btn-save">

<i class="bi bi-save"></i>

માહિતી સેવ કરો. 

</button>

</div>

</div>

</form>



  </div>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

// JavaScript yahan aayega
  const API_URL="https://script.google.com/macros/s/AKfycbwwvhNGkICcpfYeAeMuGHf5DKwRk4-6kQyM4FMfg1V6W5gc00icdmu1YaPPqgX1HwNXDw/exec";

const std=document.getElementById("std");
const cls=document.getElementById("class");
const form=document.getElementById("entryForm");

function showLoading(){
    document.getElementById("loading").style.display="flex";
}

function hideLoading(){
    document.getElementById("loading").style.display="none";
}

window.onload=()=>{
    loadSTD();
}

async function loadSTD(){

    showLoading();

    try{

        const res=await fetch(API_URL+"?action=getSTD");

        const data=await res.json();

        std.innerHTML='<option value="">Select STD</option>';

        data.forEach(s=>{

            std.innerHTML+=`<option value="${s}">${s}</option>`;

        });

    }catch(e){

        Swal.fire("Error","STD Load Failed","error");

    }

    hideLoading();

}

  std.addEventListener("change",async()=>{

    cls.innerHTML='<option>Loading...</option>';

    showLoading();

    const res=await fetch(API_URL+"?action=getClass&std="+std.value);

    const data=await res.json();

    cls.innerHTML='<option value="">Select Class</option>';

    data.forEach(c=>{

        cls.innerHTML+=`<option value="${c}">${c}</option>`;

    });

    hideLoading();

});

  document.getElementById("name").addEventListener("input",function(){

    this.value=this.value.toUpperCase();

});

  document.getElementById("mobile").addEventListener("input",function(){

    this.value=this.value.replace(/\D/g,'');

    if(this.value.length>10){

        this.value=this.value.slice(0,10);

    }

});


  form.addEventListener("submit",async function(e){

e.preventDefault();

const data = {
    std: document.getElementById("std").value,
    class: document.getElementById("class").value,
    roll: document.getElementById("roll").value,
    name: document.getElementById("name").value.trim(),
    gr: document.getElementById("gr").value,
    dob: document.getElementById("dob").value,
    mobile: document.getElementById("mobile").value,
    address: document.getElementById("address").value.trim()
};

if(Object.values(data).includes("")){

Swal.fire("Incomplete","Please Fill All Fields","warning");

return;

}

if(data.mobile.length!=10){

Swal.fire("Invalid","Enter 10 Digit Mobile Number","warning");

return;

}

showLoading();

const res=await fetch(API_URL,{

method:"POST",

body:JSON.stringify(data)

});

const result=await res.json();

hideLoading();

if(result.status=="success"){

Swal.fire({

icon:"success",

title:"Entry Saved Successfully",

html:`

<table class="table table-bordered">

<tr>

<th>STD</th>

<td>${data.std}</td>

</tr>

<tr>

<th>CLASS</th>

<td>${data.class}</td>

</tr>

<tr>

<th>ROLL</th>

<td>${data.roll}</td>

</tr>

<tr>

<th>NAME</th>

<td>${data.name}</td>

</tr>

<tr>

<th>GR</th>

<td>${data.gr}</td>

</tr>

<tr>

<th>DOB</th>

<td>${data.dob}</td>

</tr>

<tr>

<th>MOBILE</th>

<td>${data.mobile}</td>

</tr>

<tr>

<th>ADDRESS</th>

<td>${data.address}</td>

</tr>

</table>

`

});

const selectedSTD = std.value;
const selectedClass = cls.value;

// Form reset
form.reset();

// STD aur CLASS wapas set karo
std.value = selectedSTD;
cls.value = selectedClass;

// Cursor Roll Number par le jao
document.getElementById("roll").focus();

}
else{

Swal.fire("Error",result.message,"error");

}

});

  

</script>

</body>

</html>
